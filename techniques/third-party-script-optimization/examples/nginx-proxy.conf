# nginx-proxy.conf
#
# Konfigurasi Nginx untuk local hosting & proxying script pihak ketiga (e.g. Google Analytics & Google Tag Manager).
# Teknik ini menghilangkan DNS Lookups baru (karena di-serve lewat domain sendiri), 
# memaketkan handshake SSL/TLS pada connection HTTP/2 yang sama, dan memungkinkan headers caching kustom.

server {
    listen 80;
    server_name example.com;

    # Halaman utama aplikasi Anda
    location / {
        root /var/www/html;
        index index.html;
    }

    # =========================================================================
    # OPTIMASI SCRIPT PIHAK KETIGA LEWAH PROXY LOCAL
    # =========================================================================

    # 1. Proxying Google Tag Manager (gtm.js)
    location /local-gtm/ {
        # Cache internal file JS di Nginx selama 1 jam agar tidak perlu request terus ke server Google
        proxy_cache my_cache;
        proxy_cache_valid 200 60m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        # Rewrite URL dan ambil source langsung ke server Google
        resolver 8.8.8.8 [2001:4860:4860::8888] valid=300s;
        resolver_timeout 5s;
        
        proxy_pass https://www.googletagmanager.com/;
        
        # Sembunyikan header asli dan tambahkan header Cache-Control custom kita sendiri (e.g. 7 hari)
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        
        # Set User Agent, Real IP, dan modifikasi Accept-Encoding
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Bypass Cookie (keamanan dan caching)
        proxy_set_header Cookie "";
    }

    # 2. Proxying Google Analytics (v4 /gtag/js)
    location /local-gtag/ {
        proxy_cache my_cache;
        proxy_cache_valid 200 60m;
        proxy_cache_use_stale error timeout;

        resolver 8.8.8.8 valid=300s;
        
        proxy_pass https://www.googletagmanager.com/gtag/;
        
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
    }

    # 3. Proxying endpoint tracking data (Google Analytics collects)
    # Ini juga mempercepat performa karena request beacons dikirim ke subpath server kita dulu,
    # yang kemudian meneruskannya secara asinkron ke server Google Analytics di belakang layar.
    location /g/collect {
        resolver 8.8.8.8 valid=300s;
        proxy_pass https://www.google-analytics.com/g/collect;
        
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

