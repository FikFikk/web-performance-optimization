# Nginx Configuration untuk Brotli + Gzip Compression
# Untuk production deployment

# Load modules (pastikan installed)
# apt-get install nginx-module-brotli
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

http {
    # Brotli Configuration
    brotli on;
    brotli_comp_level 6;          # Level 6 untuk balanced performance
    brotli_static on;              # Serve pre-compressed .br files
    brotli_min_length 256;         # Minimum file size (bytes)
    
    # Brotli file types
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/truetype
        font/opentype
        font/eot
        image/svg+xml
        image/x-icon;
    
    # Gzip Configuration (fallback)
    gzip on;
    gzip_vary on;                  # Add "Vary: Accept-Encoding"
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_static on;                # Serve pre-compressed .gz files
    gzip_min_length 256;
    gzip_http_version 1.1;
    
    # Gzip file types
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/truetype
        font/opentype
        font/eot
        image/svg+xml
        image/x-icon;
    
    # Disable for IE6
    gzip_disable "msie6";
    
    # Cache settings untuk compressed files
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   max;
        application/javascript     max;
        ~image/                    max;
        ~font/                     max;
    }
    
    server {
        listen 80;
        server_name example.com;
        
        root /var/www/html;
        index index.html;
        
        # Cache-Control headers
        expires $expires;
        
        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        
        # Serve pre-compressed Brotli files
        location ~* \.(js|css|html|svg|json|xml)$ {
            # Try .br first, then .gz, then original
            try_files $uri$is_args$args $uri.br $uri.gz $uri =404;
            
            # Set correct encoding headers
            location ~ \.br$ {
                gzip off;
                types {}
                default_type application/octet-stream;
                add_header Content-Encoding br;
                add_header Vary Accept-Encoding;
            }
            
            location ~ \.gz$ {
                gzip off;
                types {}
                default_type application/octet-stream;
                add_header Content-Encoding gzip;
                add_header Vary Accept-Encoding;
            }
        }
        
        # Static assets with long cache
        location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # API routes - dynamic compression
        location /api/ {
            proxy_pass http://backend:3000;
            
            # Enable dynamic compression
            brotli on;
            gzip on;
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "br, gzip";
        }
    }
}
