# nginx/cache-headers.conf
# 
# Konfigurasi Nginx lengkap untuk cache headers optimal
# Tempatkan di: /etc/nginx/sites-available/myapp.conf
# atau gunakan include di server block utama.
#
# Cara test:
#   curl -I https://example.com/main.a3f2c1.js
#   Harus terlihat: cache-control: public, max-age=31536000, immutable

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    root /var/www/myapp/dist;
    index index.html;

    # ----------------------------------------------------------------
    # SSL (gunakan Let's Encrypt / certbot)
    # ----------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ----------------------------------------------------------------
    # Compression — Gzip
    # ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/json
        application/ld+json
        image/svg+xml
        font/truetype
        font/opentype
        font/woff
        application/font-woff
        application/vnd.ms-fontobject;

    # ----------------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------------
    # Cache Rules
    # ----------------------------------------------------------------

    # 1. Service Worker — TIDAK pernah di-cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # 2. HTML files — no-cache (harus revalidate setiap saat)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
        add_header Vary "Accept-Encoding";
    }

    # 3. Aset JS/CSS dengan content hash — cache 1 TAHUN (immutable)
    #    Pattern: namafile.[8-char-hex].js atau .css
    location ~* \.[a-f0-9]{6,12}\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;  # Tidak perlu log untuk aset statis
    }

    # 4. Font files dengan hash — cache 1 tahun
    location ~* \.[a-f0-9]{6,12}\.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";  # Diperlukan untuk cross-origin fonts
        access_log off;
    }

    # 5. Font files tanpa hash — cache 1 tahun (font jarang berubah)
    location ~* \.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # 6. Gambar dengan hash — cache 1 tahun
    location ~* \.[a-f0-9]{6,12}\.(png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 7. Gambar tanpa hash — cache 30 hari
    location ~* \.(png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # 8. SVG & ICO
    location ~* \.(svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 9. Manifest & robots
    location ~* \.(webmanifest|manifest\.json|robots\.txt|sitemap\.xml)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # 10. API proxy ke backend (Node.js / Python / dll)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Tambah header untuk debug cache di API
        add_header X-Cache-Status $upstream_cache_status;

        # Jangan cache di Nginx level — biarkan SW yang handle
        add_header Cache-Control "no-cache";
    }

    # 11. SPA fallback — semua route ke index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html tidak di-cache
        location = /index.html {
            add_header Cache-Control "no-cache";
            expires -1;
        }
    }

    # ----------------------------------------------------------------
    # Logging
    # ----------------------------------------------------------------
    access_log /var/log/nginx/example.com_access.log;
    error_log /var/log/nginx/example.com_error.log warn;
}

# Redirect HTTP ke HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    return 301 https://$server_name$request_uri;
}
